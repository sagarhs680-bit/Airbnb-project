services:
  mongo:
    image: mongo:7
    container_name: wonderlust-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: wonderlust-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # override local default when running in compose network
      MONGO_URL: mongodb://mongo:27017/wonderlust
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
