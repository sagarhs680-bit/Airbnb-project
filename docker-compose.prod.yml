services:
  mongo:
    image: mongo:7
    container_name: wonderlust-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: wonderlust-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://mongo:27017/wonderlust
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    container_name: wonderlust-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
